<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" role="img" aria-label="Blockly 积木与连线">
  <defs>
    <filter id="blk" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.2"/>
    </filter>
    <marker id="ar2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#0ea5e9"/>
    </marker>
  </defs>
  <rect width="720" height="400" rx="12" fill="#f8fafc"/>
  <text x="360" y="34" text-anchor="middle" fill="#0f172a" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Blockly：从积木到执行队列</text>
  <g transform="translate(24 56)" filter="url(#blk)">
    <rect width="120" height="312" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="60" y="24" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11" font-weight="700">积木箱</text>
    <rect x="10" y="36" width="100" height="22" rx="3" fill="#dbeafe"/>
    <text x="60" y="51" text-anchor="middle" fill="#1e40af" font-size="9">运动</text>
    <rect x="10" y="64" width="100" height="22" rx="3" fill="#dcfce7"/>
    <text x="60" y="79" text-anchor="middle" fill="#166534" font-size="9">抓取</text>
    <rect x="10" y="92" width="100" height="22" rx="3" fill="#fef3c7"/>
    <text x="60" y="107" text-anchor="middle" fill="#92400e" font-size="9">逻辑</text>
  </g>
  <g transform="translate(180 100)" filter="url(#blk)">
    <rect x="0" y="0" width="140" height="44" rx="6" fill="#4ade80" stroke="#15803d" stroke-width="2"/>
    <text x="70" y="22" text-anchor="middle" fill="#052e16" font-family="system-ui,sans-serif" font-size="12" font-weight="600">移动到</text>
    <text x="70" y="38" text-anchor="middle" fill="#052e16" font-family="system-ui,sans-serif" font-size="10">目标点 A</text>
    <rect x="0" y="56" width="12" height="12" fill="#15803d"/>
    <path d="M6 68 L6 88" stroke="#15803d" stroke-width="4"/>
  </g>
  <g transform="translate(180 200)" filter="url(#blk)">
    <rect x="0" y="0" width="140" height="44" rx="6" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
    <text x="70" y="22" text-anchor="middle" fill="#14532d" font-family="system-ui,sans-serif" font-size="12" font-weight="600">闭合夹爪</text>
    <text x="70" y="38" text-anchor="middle" fill="#14532d" font-family="system-ui,sans-serif" font-size="10">力度 中等</text>
    <rect x="0" y="56" width="12" height="12" fill="#16a34a"/>
    <path d="M6 68 L6 88" stroke="#16a34a" stroke-width="4"/>
  </g>
  <g transform="translate(180 300)" filter="url(#blk)">
    <rect x="0" y="0" width="160" height="40" rx="6" fill="#fde047" stroke="#ca8a04" stroke-width="2"/>
    <text x="80" y="20" text-anchor="middle" fill="#422006" font-family="system-ui,sans-serif" font-size="11" font-weight="600">重复 3 次</text>
    <text x="80" y="34" text-anchor="middle" fill="#713f12" font-family="system-ui,sans-serif" font-size="9">内含嵌套槽</text>
  </g>
  <g transform="translate(420 80)">
    <text x="140" y="0" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="12">解析为动作序列（示意）</text>
    <rect x="0" y="16" width="280" height="280" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="20" y="44" fill="#0f172a" font-family="ui-monospace,monospace" font-size="11">1. move_to(A)</text>
    <text x="20" y="68" fill="#0f172a" font-family="ui-monospace,monospace" font-size="11">2. gripper_close()</text>
    <text x="20" y="92" fill="#0f172a" font-family="ui-monospace,monospace" font-size="11">3. loop x3 { ... }</text>
    <path d="M140 120 L140 200" stroke="#0ea5e9" stroke-width="2" marker-end="url(#ar2)"/>
    <rect x="40" y="210" width="200" height="56" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="140" y="236" text-anchor="middle" fill="#0369a1" font-family="system-ui,sans-serif" font-size="11" font-weight="600">送入执行引擎</text>
    <text x="140" y="254" text-anchor="middle" fill="#0c4a6e" font-family="system-ui,sans-serif" font-size="9">与安全层校验后下发</text>
  </g>
</svg>