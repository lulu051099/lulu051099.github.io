<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="安全规则与受控执行管线示意">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#0f766e"/>
    </marker>
    <filter id="sd2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="18" fill="url(#bg2)"/>
  <text x="480" y="44" text-anchor="middle" fill="#0f172a" font-family="system-ui,sans-serif" font-size="24" font-weight="700">
    安全规则与受控执行
  </text>
  <text x="480" y="72" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="14">
    物理边界 + 轨迹校验 + 能力白名单多重防护
  </text>

  <g filter="url(#sd2)">
    <rect x="44" y="110" width="500" height="360" rx="14" fill="url(#panel)" stroke="#cbd5e1" stroke-width="2"/>
    <text x="294" y="140" text-anchor="middle" fill="#1e293b" font-family="system-ui,sans-serif" font-size="16" font-weight="700">
      工作区俯视图示意
    </text>

    <rect x="82" y="178" width="424" height="250" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="6 5"/>
    <text x="294" y="202" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="12">机械臂最大工作范围</text>

    <rect x="142" y="228" width="304" height="170" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="294" y="252" text-anchor="middle" fill="#166534" font-family="system-ui,sans-serif" font-size="12" font-weight="700">安全执行区 (有效标定区)</text>

    <!-- 禁入区 -->
    <rect x="94" y="236" width="38" height="154" rx="6" fill="#fee2e2" stroke="#ef4444"/>
    <rect x="456" y="236" width="38" height="154" rx="6" fill="#fee2e2" stroke="#ef4444"/>
    <rect x="162" y="186" width="264" height="30" rx="6" fill="#fee2e2" stroke="#ef4444"/>
    <rect x="162" y="408" width="264" height="30" rx="6" fill="#fee2e2" stroke="#ef4444"/>
    <text x="294" y="428" text-anchor="middle" fill="#991b1b" font-family="system-ui,sans-serif" font-size="11">危险/禁入区 (如底座后方)</text>

    <!-- 轨迹示例 -->
    <circle cx="240" cy="312" r="9" fill="#3b82f6" stroke="#1d4ed8"/>
    <text x="240" y="332" text-anchor="middle" fill="#1e3a8a" font-family="system-ui,sans-serif" font-size="11">起点</text>
    <circle cx="352" cy="288" r="9" fill="#ef4444" stroke="#991b1b"/>
    <text x="352" y="308" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,sans-serif" font-size="11">目标</text>

    <!-- 正常轨迹 -->
    <path d="M240 312 C268 288, 308 278, 352 288" fill="none" stroke="#16a34a" stroke-width="4"/>
    <text x="286" y="276" text-anchor="middle" fill="#166534" font-family="system-ui,sans-serif" font-size="11">安全轨迹</text>

    <!-- 危险轨迹 -->
    <path d="M240 312 C220 226, 124 212, 112 282" fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="7 5"/>
    <text x="160" y="215" text-anchor="middle" fill="#991b1b" font-family="system-ui,sans-serif" font-size="11">危险越界轨迹 (被拦截)</text>
  </g>

  <g filter="url(#sd2)">
    <rect x="576" y="110" width="340" height="360" rx="14" fill="url(#panel)" stroke="#cbd5e1" stroke-width="2"/>
    <text x="746" y="140" text-anchor="middle" fill="#1e293b" font-family="system-ui,sans-serif" font-size="16" font-weight="700">
      受控执行管线
    </text>

    <rect x="602" y="170" width="288" height="58" rx="10" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="746" y="193" text-anchor="middle" fill="#1e3a8a" font-family="system-ui,sans-serif" font-size="12" font-weight="700">
      1) 计划输入 (来自 LLM/Blockly)
    </text>
    <text x="746" y="212" text-anchor="middle" fill="#1e3a8a" font-family="system-ui,sans-serif" font-size="11">
      move_to / grasp / place ...
    </text>

    <rect x="602" y="244" width="288" height="68" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="746" y="267" text-anchor="middle" fill="#92400e" font-family="system-ui,sans-serif" font-size="12" font-weight="700">
      2) 安全校验模块
    </text>
    <text x="746" y="286" text-anchor="middle" fill="#92400e" font-family="system-ui,sans-serif" font-size="11">
      边界限制? 速度限制? 能力白名单?
    </text>

    <rect x="602" y="328" width="136" height="82" rx="10" fill="#dcfce7" stroke="#22c55e"/>
    <text x="670" y="352" text-anchor="middle" fill="#166534" font-family="system-ui,sans-serif" font-size="12" font-weight="700">通过</text>
    <text x="670" y="372" text-anchor="middle" fill="#166534" font-family="system-ui,sans-serif" font-size="11">下发至硬件</text>
    <text x="670" y="390" text-anchor="middle" fill="#166534" font-family="system-ui,sans-serif" font-size="11">允许执行任务</text>

    <rect x="754" y="328" width="136" height="82" rx="10" fill="#fee2e2" stroke="#ef4444"/>
    <text x="822" y="352" text-anchor="middle" fill="#991b1b" font-family="system-ui,sans-serif" font-size="12" font-weight="700">拦截</text>
    <text x="822" y="372" text-anchor="middle" fill="#991b1b" font-family="system-ui,sans-serif" font-size="11">拒绝下发</text>
    <text x="822" y="390" text-anchor="middle" fill="#991b1b" font-family="system-ui,sans-serif" font-size="11">向界面抛出异常</text>

    <path d="M746 228 L746 242" stroke="#0f766e" stroke-width="3" marker-end="url(#arr2)"/>
    <path d="M746 312 L746 325" stroke="#0f766e" stroke-width="3" marker-end="url(#arr2)"/>
  </g>

  <rect x="44" y="486" width="872" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="62" y="510" fill="#475569" font-family="system-ui,sans-serif" font-size="12">
    注：系统内置虚拟仿真先行校验机制，所有规划指令在物理下发前均完成碰撞测试。
  </text>
</svg>
