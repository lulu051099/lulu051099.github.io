<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="自然语言任务到机械臂执行流程示意">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#0284c7"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="18" fill="url(#bg)"/>
  <text x="480" y="44" text-anchor="middle" fill="#0f172a" font-family="system-ui,sans-serif" font-size="24" font-weight="700">
    自然语言任务（LLM）执行链路
  </text>
  <text x="480" y="72" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="14">
    输入任务 → 意图解析 → 动作计划 → 安全校验 → 机械臂执行
  </text>

  <g filter="url(#shadow)">
    <rect x="58" y="112" width="190" height="290" rx="14" fill="url(#card)" stroke="#bfdbfe" stroke-width="2"/>
    <text x="153" y="142" text-anchor="middle" fill="#1d4ed8" font-family="system-ui,sans-serif" font-size="16" font-weight="700">任务输入</text>
    <rect x="78" y="162" width="150" height="94" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="153" y="190" text-anchor="middle" fill="#1e3a8a" font-family="system-ui,sans-serif" font-size="12">示例</text>
    <text x="153" y="212" text-anchor="middle" fill="#1e3a8a" font-family="system-ui,sans-serif" font-size="12">把红色积木放到</text>
    <text x="153" y="230" text-anchor="middle" fill="#1e3a8a" font-family="system-ui,sans-serif" font-size="12">蓝色积木左侧</text>
    <text x="153" y="282" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">包含 目标物 / 关系 / 动作</text>
    <text x="153" y="305" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">描述越明确，成功率越高</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="286" y="112" width="204" height="290" rx="14" fill="url(#card)" stroke="#c7d2fe" stroke-width="2"/>
    <text x="388" y="142" text-anchor="middle" fill="#4338ca" font-family="system-ui,sans-serif" font-size="16" font-weight="700">LLM 解析</text>
    <rect x="308" y="166" width="160" height="54" rx="8" fill="#eef2ff" stroke="#a5b4fc"/>
    <text x="388" y="188" text-anchor="middle" fill="#312e81" font-family="system-ui,sans-serif" font-size="12">实体识别</text>
    <text x="388" y="206" text-anchor="middle" fill="#312e81" font-family="system-ui,sans-serif" font-size="12">红色积木 / 蓝色积木</text>
    <rect x="308" y="232" width="160" height="54" rx="8" fill="#eef2ff" stroke="#a5b4fc"/>
    <text x="388" y="254" text-anchor="middle" fill="#312e81" font-family="system-ui,sans-serif" font-size="12">关系提取</text>
    <text x="388" y="272" text-anchor="middle" fill="#312e81" font-family="system-ui,sans-serif" font-size="12">left_of(blue)</text>
    <rect x="308" y="298" width="160" height="66" rx="8" fill="#eef2ff" stroke="#a5b4fc"/>
    <text x="388" y="320" text-anchor="middle" fill="#312e81" font-family="system-ui,sans-serif" font-size="12">步骤草案</text>
    <text x="388" y="338" text-anchor="middle" fill="#312e81" font-family="system-ui,sans-serif" font-size="12">识别 → 抓取 → 放置</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="528" y="112" width="194" height="290" rx="14" fill="url(#card)" stroke="#99f6e4" stroke-width="2"/>
    <text x="625" y="142" text-anchor="middle" fill="#0f766e" font-family="system-ui,sans-serif" font-size="16" font-weight="700">动作计划</text>
    <text x="548" y="178" fill="#115e59" font-family="ui-monospace,monospace" font-size="12">1. detect(red, blue)</text>
    <text x="548" y="204" fill="#115e59" font-family="ui-monospace,monospace" font-size="12">2. move_to(red)</text>
    <text x="548" y="230" fill="#115e59" font-family="ui-monospace,monospace" font-size="12">3. gripper_close()</text>
    <text x="548" y="256" fill="#115e59" font-family="ui-monospace,monospace" font-size="12">4. move_to(left_of(blue))</text>
    <text x="548" y="282" fill="#115e59" font-family="ui-monospace,monospace" font-size="12">5. gripper_open()</text>
    <rect x="548" y="312" width="154" height="52" rx="8" fill="#ccfbf1" stroke="#2dd4bf"/>
    <text x="625" y="334" text-anchor="middle" fill="#134e4a" font-family="system-ui,sans-serif" font-size="12">可解释步骤回显</text>
    <text x="625" y="352" text-anchor="middle" fill="#134e4a" font-family="system-ui,sans-serif" font-size="12">便于教师讲解与复盘</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="752" y="112" width="150" height="290" rx="14" fill="url(#card)" stroke="#fecaca" stroke-width="2"/>
    <text x="827" y="142" text-anchor="middle" fill="#b91c1c" font-family="system-ui,sans-serif" font-size="16" font-weight="700">执行层</text>
    <rect x="770" y="168" width="114" height="70" rx="8" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="827" y="190" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,sans-serif" font-size="12">安全校验</text>
    <text x="827" y="208" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,sans-serif" font-size="12">越界拦截</text>
    <text x="827" y="226" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,sans-serif" font-size="12">参数合法性</text>
    <rect x="770" y="252" width="114" height="98" rx="8" fill="#f0fdf4" stroke="#86efac"/>
    <text x="827" y="278" text-anchor="middle" fill="#14532d" font-family="system-ui,sans-serif" font-size="12">机械臂执行</text>
    <text x="827" y="296" text-anchor="middle" fill="#14532d" font-family="system-ui,sans-serif" font-size="12">抓取 / 放置</text>
    <text x="827" y="314" text-anchor="middle" fill="#14532d" font-family="system-ui,sans-serif" font-size="12">状态回传日志</text>
  </g>

  <path d="M248 257 L282 257" stroke="#0284c7" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M490 257 L524 257" stroke="#0284c7" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M722 257 L748 257" stroke="#0284c7" stroke-width="3" marker-end="url(#arr)"/>

  <rect x="58" y="432" width="844" height="72" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="80" y="460" fill="#334155" font-family="system-ui,sans-serif" font-size="13">
    教学要点：先看“步骤草案”再执行；若被拦截，优先检查目标是否存在、坐标是否越界、设备是否在线。
  </text>
  <text x="80" y="484" fill="#64748b" font-family="system-ui,sans-serif" font-size="12">
    注：示意图用于课堂讲解，实际字段与日志格式以系统版本为准。
  </text>
</svg>
