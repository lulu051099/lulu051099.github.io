<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="双模式统一执行引擎示意">
  <defs>
    <filter id="ds" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="eng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="720" height="360" rx="14" fill="#f8fafc"/>
  <text x="360" y="36" text-anchor="middle" fill="#0f172a" font-family="system-ui,sans-serif" font-size="17" font-weight="700">两种入口，同一套执行与安全策略</text>
  <g transform="translate(40 70)" filter="url(#ds)">
    <rect width="200" height="240" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="100" y="32" text-anchor="middle" fill="#0369a1" font-family="system-ui,sans-serif" font-size="13" font-weight="700">自然语言</text>
    <rect x="16" y="48" width="168" height="52" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="24" y="72" fill="#1e40af" font-family="system-ui,sans-serif" font-size="11">「抓取红色方块」</text>
    <text x="24" y="88" fill="#64748b" font-family="system-ui,sans-serif" font-size="9">LLM 解析为动作序列</text>
  </g>
  <g transform="translate(480 70)" filter="url(#ds)">
    <rect width="200" height="240" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="100" y="32" text-anchor="middle" fill="#15803d" font-family="system-ui,sans-serif" font-size="13" font-weight="700">Blockly</text>
    <rect x="20" y="52" width="72" height="28" rx="4" fill="#4ade80" stroke="#16a34a"/>
    <rect x="98" y="52" width="72" height="28" rx="4" fill="#86efac" stroke="#22c55e"/>
    <rect x="59" y="88" width="90" height="28" rx="4" fill="#fde047" stroke="#ca8a04"/>
    <text x="104" y="106" text-anchor="middle" fill="#422006" font-family="system-ui,sans-serif" font-size="10">拼接为程序</text>
  </g>
  <g transform="translate(300 130)" filter="url(#ds)">
    <circle cx="60" cy="60" r="58" fill="url(#eng)" stroke="#0c4a6e" stroke-width="3"/>
    <text x="60" y="52" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="12" font-weight="700">执行引擎</text>
    <text x="60" y="72" text-anchor="middle" fill="#e0f2fe" font-family="system-ui,sans-serif" font-size="10">规划 · 限速 · 急停</text>
    <text x="60" y="92" text-anchor="middle" fill="#bae6fd" font-family="system-ui,sans-serif" font-size="9">安全层统一拦截</text>
  </g>
  <path d="M240 200 L292 200" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a1)"/>
  <path d="M480 200 L428 200" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a1)"/>
  <g transform="translate(300 248)">
    <text x="60" y="0" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">驱动机械臂</text>
    <path d="M20 40 L60 20 L100 40 L80 70 L40 70 Z" fill="#94a3b8" stroke="#475569" stroke-width="2"/>
    <rect x="48" y="70" width="24" height="36" fill="#64748b" stroke="#334155" stroke-width="1.5"/>
  </g>
</svg>
