<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-label="故障排除流程">
  <defs>
    <filter id="tsh" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="ma" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0 0 L7 3.5 L0 7 Z" fill="#d97706"/>
    </marker>
  </defs>
  <rect width="720" height="300" rx="12" fill="#fffbeb"/>
  <text x="360" y="36" text-anchor="middle" fill="#92400e" font-family="system-ui,sans-serif" font-size="17" font-weight="700">排障思路：先现象，再日志，后环境</text>
  <g transform="translate(20 70)" font-family="system-ui,sans-serif">
    <rect x="0" y="0" width="108" height="52" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#tsh)"/>
    <text x="54" y="24" text-anchor="middle" fill="#78350f" font-size="11" font-weight="600">发现异常</text>
    <text x="54" y="42" text-anchor="middle" fill="#a16207" font-size="9">无法连接/不动</text>
    <path d="M108 26 L124 26" stroke="#d97706" stroke-width="2" marker-end="url(#ma)"/>
    <rect x="124" y="0" width="108" height="52" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#tsh)"/>
    <text x="178" y="24" text-anchor="middle" fill="#78350f" font-size="11" font-weight="600">查看日志</text>
    <text x="178" y="42" text-anchor="middle" fill="#a16207" font-size="9">错误码/时间线</text>
    <path d="M232 26 L248 26" stroke="#d97706" stroke-width="2" marker-end="url(#ma)"/>
    <rect x="248" y="0" width="108" height="52" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#tsh)"/>
    <text x="302" y="24" text-anchor="middle" fill="#78350f" font-size="11" font-weight="600">定位原因</text>
    <text x="302" y="42" text-anchor="middle" fill="#a16207" font-size="9">网络/驱动/标定</text>
    <path d="M356 26 L372 26" stroke="#d97706" stroke-width="2" marker-end="url(#ma)"/>
    <rect x="372" y="0" width="108" height="52" rx="10" fill="#fde68a" stroke="#b45309" stroke-width="2" filter="url(#tsh)"/>
    <text x="426" y="24" text-anchor="middle" fill="#78350f" font-size="11" font-weight="600">恢复运行</text>
    <text x="426" y="42" text-anchor="middle" fill="#a16207" font-size="9">重连/重启</text>
    <path d="M480 26 L496 26" stroke="#d97706" stroke-width="2" marker-end="url(#ma)"/>
    <rect x="496" y="0" width="108" height="52" rx="10" fill="#fde68a" stroke="#b45309" stroke-width="2" filter="url(#tsh)"/>
    <text x="550" y="24" text-anchor="middle" fill="#78350f" font-size="11" font-weight="600">仍失败</text>
    <text x="550" y="42" text-anchor="middle" fill="#a16207" font-size="9">联系管理员</text>
    <path d="M604 26 L620 26" stroke="#d97706" stroke-width="2" marker-end="url(#ma)"/>
    <rect x="620" y="0" width="80" height="52" rx="10" fill="#fff" stroke="#92400e" stroke-width="2" filter="url(#tsh)"/>
    <text x="660" y="30" text-anchor="middle" fill="#78350f" font-size="11" font-weight="600">附录</text>
  </g>
  <text x="360" y="170" text-anchor="middle" fill="#a16207" font-family="system-ui,sans-serif" font-size="12">记录错误码与复现步骤，便于快速处理。</text>
  <rect x="80" y="200" width="560" height="72" rx="8" fill="#fff" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="360" y="228" text-anchor="middle" fill="#854d0e" font-family="system-ui,sans-serif" font-size="11" font-weight="600">自助检查小贴士</text>
  <text x="360" y="252" text-anchor="middle" fill="#a16207" font-family="system-ui,sans-serif" font-size="10">① 浏览器强制刷新 ② 换网线/USB口 ③ 确认同网段 ④ 急停是否释放</text>
</svg>