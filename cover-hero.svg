<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 700" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Teaching planar 3-DOF robot arm cover">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8eef5"/>
      <stop offset="100%" stop-color="#c5d0de"/>
    </linearGradient>
    <linearGradient id="fadeB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <rect width="520" height="700" fill="url(#bg)"/>
  <rect x="0" y="430" width="520" height="270" fill="url(#fadeB)"/>

  <!-- 木色台面 -->
  <rect x="0" y="556" width="520" height="144" fill="#9d7b4a" stroke="#0f172a" stroke-width="2"/>
  <rect x="0" y="556" width="520" height="14" fill="#c4a574"/>

  <!-- 左侧控制台（扁平风） -->
  <g transform="translate(24 96)">
    <rect x="0" y="0" width="118" height="92" rx="6" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/>
    <rect x="10" y="12" width="98" height="52" rx="3" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
    <rect x="16" y="18" width="86" height="16" rx="3" fill="#1e40af"/>
    <text x="20" y="30" fill="#bfdbfe" font-family="system-ui,sans-serif" font-size="8">指令已就绪</text>
    <rect x="16" y="40" width="86" height="14" rx="2" fill="#166534"/>
    <text x="20" y="50" fill="#86efac" font-family="system-ui,sans-serif" font-size="7">安全校验</text>
  </g>

  <!-- 底座（深灰平板） -->
  <rect x="178" y="518" width="138" height="40" rx="4" fill="#4b5563" stroke="#0f172a" stroke-width="3.5"/>

  <!-- 连杆 + 关节（粗黑边扁平插画风） -->
  
    <line x1="248" y1="524" x2="318" y2="398" stroke="#0f172a" stroke-width="22" stroke-linecap="round"/>
    <line x1="248" y1="524" x2="318" y2="398" stroke="#e8ecf0" stroke-width="14" stroke-linecap="round"/>
  
    <circle cx="318" cy="398" r="13" fill="#d1d5db" stroke="#0f172a" stroke-width="3.5"/>
  
    <line x1="318" y1="398" x2="392" y2="288" stroke="#0f172a" stroke-width="22" stroke-linecap="round"/>
    <line x1="318" y1="398" x2="392" y2="288" stroke="#e8ecf0" stroke-width="14" stroke-linecap="round"/>
  
    <circle cx="392" cy="288" r="11" fill="#d1d5db" stroke="#0f172a" stroke-width="3.5"/>
  
    <line x1="392" y1="288" x2="438" y2="248" stroke="#0f172a" stroke-width="22" stroke-linecap="round"/>
    <line x1="392" y1="288" x2="438" y2="248" stroke="#e8ecf0" stroke-width="14" stroke-linecap="round"/>
  
    <circle cx="248" cy="524" r="15" fill="#d1d5db" stroke="#0f172a" stroke-width="3.5"/>

  <!-- 平行夹爪 -->
  <g transform="translate(438,248)">
    <path d="M-4 8 L-18 22 L-10 28 L4 14 Z" fill="#9ca3af" stroke="#0f172a" stroke-width="2.5"/>
    <path d="M4 8 L18 22 L10 28 L-4 14 Z" fill="#9ca3af" stroke="#0f172a" stroke-width="2.5"/>
  </g>
  <!-- 夹爪中的红块 -->
  <rect x="427" y="210" width="24" height="24" rx="2" fill="#ef4444" stroke="#0f172a" stroke-width="2.5"/>

  <!-- 台上积木：堆叠（蓝在上、浅木色在下）+ 独立红块 -->
  <rect x="72" y="528" width="26" height="30" rx="2" fill="#d4b896" stroke="#0f172a" stroke-width="2.5"/>
  <rect x="72" y="498" width="26" height="30" rx="2" fill="#2563eb" stroke="#0f172a" stroke-width="2.5"/>
  <rect x="38" y="528" width="26" height="30" rx="2" fill="#ef4444" stroke="#0f172a" stroke-width="2.5"/>

  <!-- 说明标签 -->
  <g font-family="system-ui,sans-serif">
    <rect x="268" y="44" width="212" height="52" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
    <text x="374" y="70" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="800">三关节机械臂</text>
    <text x="374" y="88" text-anchor="middle" fill="#475569" font-size="10">平面关节 · 教学演示</text>
  </g>
</svg>