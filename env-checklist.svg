  <g transform="translate(360 60)" filter="url(#f1)">
    <rect width="328" height="292" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="16" y="28" fill="#334155" font-family="system-ui,sans-serif" font-size="13" font-weight="700">工位与安全区</text>
    <rect x="24" y="48" width="280" height="200" rx="6" fill="#fafafa" stroke="#e2e8f0"/>
    <rect x="80" y="100" width="168" height="120" rx="4" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="8 4"/>
    <text x="164" y="92" text-anchor="middle" fill="#15803d" font-family="system-ui,sans-serif" font-size="11">安全作业区</text>
    <rect x="40" y="180" width="248" height="56" fill="url(#hatch)" opacity="0.6"/>
    <text x="164" y="212" text-anchor="middle" fill="#b91c1c" font-family="system-ui,sans-serif" font-size="10">边界外 · 禁止伸入</text>
