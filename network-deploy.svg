<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-label="网络与部署拓扑">
  <defs>
    <filter id="nsh" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="720" height="340" rx="12" fill="#f8fafc"/>
  <text x="360" y="34" text-anchor="middle" fill="#0f172a" font-family="system-ui,sans-serif" font-size="17" font-weight="700">部署拓扑（示例）</text>
  <g transform="translate(40 70)" filter="url(#nsh)">
    <rect width="120" height="88" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
    <text x="60" y="36" text-anchor="middle" fill="#1e3a8a" font-family="system-ui,sans-serif" font-size="12" font-weight="700">教学主机</text>
    <text x="60" y="56" text-anchor="middle" fill="#64748b" font-size="10">浏览器客户端</text>
  </g>
  <text x="200" y="118" fill="#94a3b8" font-size="20">→</text>
  <g transform="translate(230 70)" filter="url(#nsh)">
    <rect width="120" height="88" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="60" y="36" text-anchor="middle" fill="#3730a3" font-family="system-ui,sans-serif" font-size="12" font-weight="700">交换机/路由</text>
    <text x="60" y="56" text-anchor="middle" fill="#64748b" font-size="10">实验室局域网</text>
  </g>
  <text x="390" y="118" fill="#94a3b8" font-size="20">→</text>
  <g transform="translate(420 70)" filter="url(#nsh)">
    <rect width="140" height="88" rx="10" fill="#fff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="70" y="34" text-anchor="middle" fill="#0369a1" font-family="system-ui,sans-serif" font-size="12" font-weight="700">应用服务器</text>
    <text x="70" y="52" text-anchor="middle" fill="#64748b" font-size="9">API · 任务队列</text>
    <text x="70" y="68" text-anchor="middle" fill="#64748b" font-size="9">LLM 代理（若启用）</text>
  </g>
  <text x="600" y="118" fill="#94a3b8" font-size="20">→</text>
  <g transform="translate(620 70)" filter="url(#nsh)">
    <rect width="100" height="100" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <path d="M30 75 L50 45 L70 45 L90 75 Z" fill="#94a3b8" stroke="#475569"/>
    <rect x="44" y="75" width="12" height="18" fill="#64748b"/>
    <text x="50" y="108" text-anchor="middle" fill="#334155" font-size="9">机械臂</text>
  </g>
  <g transform="translate(180 200)" filter="url(#nsh)">
    <rect width="360" height="100" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="180" y="32" text-anchor="middle" fill="#9a3412" font-family="system-ui,sans-serif" font-size="12" font-weight="700">说明</text>
    <text x="180" y="56" text-anchor="middle" fill="#c2410c" font-family="system-ui,sans-serif" font-size="11">具体 IP、端口、HTTPS、账号由实验室管理员配置；</text>
    <text x="180" y="74" text-anchor="middle" fill="#c2410c" font-family="system-ui,sans-serif" font-size="11">本图仅为逻辑结构。</text>
  </g>
</svg>
